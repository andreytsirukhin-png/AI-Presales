services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
